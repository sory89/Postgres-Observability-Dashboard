services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${LOCAL_PG_USER:-observe}
      POSTGRES_PASSWORD: ${LOCAL_PG_PASSWORD:-observe}
      POSTGRES_DB:       ${LOCAL_PG_DB:-observe}
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - track_activity_query_size=4096
      - -c
      - pg_stat_statements.max=10000
    ports:
      - "${LOCAL_PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./seed:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOCAL_PG_USER:-observe}"]
      interval: 5s
      timeout: 3s
      retries: 10

  dashboard:
    build: .
    container_name: observe-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      LOCAL_PG_HOST:     postgres
      LOCAL_PG_PORT:     5432
      LOCAL_PG_DB:       ${LOCAL_PG_DB:-observe}
      LOCAL_PG_USER:     ${LOCAL_PG_USER:-observe}
      LOCAL_PG_PASSWORD: ${LOCAL_PG_PASSWORD:-observe}
      LOCAL_PG_SSLMODE:  disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
